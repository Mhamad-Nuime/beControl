<div
  [id]="'industrial-served-card-' + index()"
  [class]="
    'served-section-trigger text-white bg-black/10 p-4 rounded-md grid grid-cols-2 ' +
    styleClass()
  "
>
  <div class="col-span-2 md:col-span-1">
    <div class="flex justify-between items-center">
      <h3 class="industrial-served-card-heading text-2xl mb-4 md:text-3xl lg:md:text-4xl">{{`section.industriesServed.${section()}.title` | translate}}</h3>
      <!-- <a class="hover:bg-black/8 active:bg-black/15 p-2 rounded-md text-primary-200">{{
        'seeMore' | translate
      }}</a> -->
    </div>
    <p class="mb-2 industrial-served-card-paragraph">
      {{`section.industriesServed.${section()}.content` | translate}}
    </p>
  </div>
  <div class="rounded-xl lg:max-h-100 overflow-hidden flex items-start col-span-2 md:col-span-1 md:h-75 lg:h-100">
    <img class="w-full h-full object-cover industrial-served-card-img responsive-origin" [src]="`image/served-${index()}.webp`" alt="" />
  </div>
</div>
